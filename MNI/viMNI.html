<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <style> body {font-family: 'Plus Jakarta Sans', sans-serif;} </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        fetch("/components/header.html")
          .then(res => res.text())
          .then(data => {
            document.getElementById("header").innerHTML = data;
          });
      });

      document.addEventListener("DOMContentLoaded", function () {
        fetch("/components/footer.html")
          .then(res => res.text())
          .then(data => {
            document.getElementById("footer").innerHTML = data;
          });
      });
    </script>
    <title>rahmadip Portfolio</title>
    <link rel="icon" href="/components/favicon-dark.svg" type="image/svg+xml" media="(prefers-color-scheme: light)">
    <link rel="icon" href="/components/favicon-light.svg" type="image/svg+xml" media="(prefers-color-scheme: dark)">
</head>
<body class="bg-gray-100">
  <header id="header" class="z-50 sticky top-0 right-0 left-0"></header>

  <div class="mx-auto max-w-screen-xl">
    <img src="/MNI/Visual Identity - 720P.png" alt="">
  </div>

  <footer id="footer"></footer>
</body>
</html>
