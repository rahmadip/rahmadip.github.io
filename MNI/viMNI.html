<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <style> body {font-family: 'Plus Jakarta Sans', sans-serif;} </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        fetch("/components/header.html")
          .then(res => res.text())
          .then(data => {
            document.getElementById("header").innerHTML = data;
          });
      });

      document.addEventListener("DOMContentLoaded", function () {
        fetch("/components/footer.html")
          .then(res => res.text())
          .then(data => {
            document.getElementById("footer").innerHTML = data;
          });
      });
    </script>
    <title>rahmadip Portfolio</title>
    <link rel="icon" href="/components/favicon-dark.svg" type="image/svg+xml" media="(prefers-color-scheme: light)">
    <link rel="icon" href="/components/favicon-light.svg" type="image/svg+xml" media="(prefers-color-scheme: dark)">
</head>
<body class="bg-gray-100">
  <header id="header" class="z-50 sticky top-0 right-0 left-0"></header>

  <div class="bg-gray-200 mx-auto max-w-screen-xl px-4 sm:px-6 lg:px-8">

        <span> </span>

            You can download this page in PDF format at this
            <a href="#" class="inline-block underline hover:font-extrabold">link</a>
        </p>

        <button
            type="button"
            aria-label="Dismiss"
            class="hover:text-black"
            onclick="document.getElementById('announcement').style.display='none'"
            >
            <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="size-4 lg:size-6"
            >
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
            </svg>
        </button>

    </div>
  </div>

  <div class="mx-auto max-w-screen-xl">
    <img src="/MNI/componentVIMNI/Visual Identity - Print Layout.png" alt="">
    <img src="/MNI/componentVIMNI/Visual Identity - Motion Logo.png" alt="">

    <img src="/grid.svg" alt="">

    <div class="bg-[#fafafa] aspect-16/9">

      <p>Logo motion resmi Media Nawacita Indonesia yang dapat diaplikasikan di media digital. Motion logo mempunyai dua variasi, yaitu motion logo bewarna dan motion logo hitam putih.</p>

      <div class="aspect-video overflow-hidden flex items-center justify-center">
        <video
          id="videoPlayer"
          autoplay
          loop
          muted
          playsinline
          class="h-full w-auto object-cover"
          src="/MNI/componentVIMNI/Animate MNI Full Color.mp4"
        ></video>
      </div>
    
      <a
        id="nextButton"
        class="inline-block rounded-full border border-indigo-600 p-3 text-indigo-600 hover:bg-indigo-600 hover:text-white focus:ring-3 focus:outline-hidden cursor-pointer"
      >
        <span class="sr-only"> Next Video </span>
        <svg
          class="size-5 shadow-sm rtl:rotate-180"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M14 5l7 7m0 0l-7 7m7-7H3"
          />
        </svg>
      </a>

    </div>

  </div>

  <footer id="footer"></footer>

  <script>
    (function () {
      const videoSources = [
        "/MNI/componentVIMNI/Animate MNI Full Color.mp4",
        "/MNI/componentVIMNI/Animate MNI Full Blue.mp4",
        "/MNI/componentVIMNI/Animate MNI Full Orange.mp4",
        "/MNI/componentVIMNI/Animate MNI Full Black.mp4"
      ];
  
      let currentVideo = 0;
      const videoElement = document.getElementById("videoPlayer");
      const nextButton = document.getElementById("nextButton");
  
      nextButton.addEventListener("click", () => {
        currentVideo = (currentVideo + 1) % videoSources.length;
        videoElement.src = videoSources[currentVideo];
        videoElement.play(); // pastikan video langsung play
      });
    })();
  </script>
