    <script src="ScriptIndex.js"></script>
    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxSzWF7bIFZUgmjwo1T7bO3fVRlJd-Rd8QWMfKaamCdZZeDt8r76B-wDMoRgTfb3fSmIA/exec'
        const form = document.forms['PortfolioMessage']
        const ButtonSend = document.getElementById('ButtonSend');
        const ButtonLoading = document.getElementById('ButtonLoading');
        const ButtonSent = document.getElementById('ButtonSent');
      
        form.addEventListener('submit', e => {
          e.preventDefault();
          ButtonSend.style.display = 'none';
          ButtonLoading.style.display = 'inline-block';
          fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                ButtonSent.style.display = 'inline-block';
                ButtonSend.style.display = 'inline-block';
                ButtonLoading.style.display = 'none';
                form.reset();
                console.log('Success!', response)
            })
            .catch(error => console.error('Error!', error.message))
        })
    </script>
